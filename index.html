<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard | Advanced URL Detection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <h1><i class="fas fa-shield-alt"></i> PhishGuard</h1>
            <p>Advanced Phishing URL Detection Platform</p>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        </header>

        <section class="scanner-section">
            <div class="card">
                <h2>Scan a URL</h2>
                <div class="input-group">
                    <input type="text" id="url-input" placeholder="https://example.com" aria-label="URL to scan">
                    <button id="scan-btn">Analyze</button>
                </div>
                <div id="loader" class="hidden">Scanning...</div>
            </div>
        </section>

        <section id="results-section" class="hidden">
            <div class="card result-card">
                <div class="result-header">
                    <h3>Analysis Results</h3>
                    <div id="risk-badge" class="badge">Safe</div>
                </div>
                <div class="score-container">
                    <div class="score-circle">
                        <span id="risk-score">0</span>
                        <small>Risk Score</small>
                    </div>
                </div>
                <div id="check-list" class="check-list">
                    <!-- Checks will be injected here -->
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <h4>WHOIS Information</h4>
                    <div id="whois-info" class="info-list"></div>
                </div>
                <div class="card">
                    <h4>DNS Records</h4>
                    <div id="dns-info" class="info-list"></div>
                </div>
            </div>
        </section>

        <section class="stats-section">
            <div class="grid">
                <div class="card stat-card">
                    <i class="fas fa-search"></i>
                    <h4 id="stat-total">0</h4>
                    <p>Total Scans</p>
                </div>
                <div class="card stat-card">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h4 id="stat-high-risk">0</h4>
                    <p>High Risk Detected</p>
                </div>
                <div class="card stat-card">
                    <i class="fas fa-chart-line"></i>
                    <h4 id="stat-avg">0</h4>
                    <p>Avg Risk Score</p>
                </div>
            </div>
        </section>

        <section class="history-section">
            <div class="card">
                <div class="card-header">
                    <h3>Recent Scan History</h3>
                    <div class="export-btns">
                        <button id="export-csv" class="btn-small">CSV</button>
                        <button id="export-json" class="btn-small">JSON</button>
                    </div>
                </div>
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>URL</th>
                            <th>Risk Score</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- History rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
